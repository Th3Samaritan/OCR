name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Install from the API requirements file (single source of truth) so CI
        # can't drift from the real dependency set. pytest is the only dev-only
        # extra. The OCR service's mock path needs no GPU deps.
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt pytest

      - name: Run tests
        run: python -m pytest -q
